<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>더치페이 정산 결과</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.css" />
<style>
  body { max-width: 480px; margin: 0 auto; padding: 24px; font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; color: #191f28; }
  h1 { font-size: 20px; margin-bottom: 16px; }
  h2 { font-size: 16px; margin-bottom: 8px; }
  ul { padding-left: 20px; margin-bottom: 24px; }
</style>
</head>
<body>
<div id="app"><p id="status">불러오는 중...</p></div>

<script>
  // 이 파일은 GitHub Pages(Supabase 밖)에서 서빙된다. Supabase는 *.supabase.co 도메인에서
  // text/html 응답을 강제로 text/plain으로 바꿔버려서(피싱 방지 정책으로 추정 -- Storage
  // public 버킷, Edge Function 양쪽에서 재현됨), 정적 뷰어 자체를 완전히 밖으로 뺐다.
  // 데이터는 여전히 Supabase Edge Function(JSON)에서 가져온다.
  // (docs/product-spec.md 10.2 이슈2 참고)
  const SUPABASE_URL = "https://nvwqtuaatyqewietbwgc.supabase.co";

  const isKo = (navigator.language || "ko-KR").toLowerCase().startsWith("ko");
  const t = (ko, en) => (isKo ? ko : en);

  function formatCurrency(amount) {
    return isKo ? amount.toLocaleString() + "원" : "₩" + amount.toLocaleString();
  }

  function findName(participants, id) {
    const p = participants.find((p) => p.id === id);
    return p ? p.display_name : t("알 수 없음", "Unknown");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function render(html) {
    document.getElementById("app").innerHTML = html;
  }

  const params = new URLSearchParams(location.search);
  const token = params.get("token");

  if (!token) {
    render("<p>" + t("정산 결과를 찾을 수 없어요. 링크를 다시 확인해주세요.", "Couldn't find this settlement. Please check the link again.") + "</p>");
  } else {
    fetch(SUPABASE_URL + "/functions/v1/settlement-viewer/" + encodeURIComponent(token))
      .then((res) => res.json())
      .then((result) => {
        if (result.status === "ok") {
          const data = result.data;
          const shareItems = data.shares
            .map(
              (s) =>
                "<li>" +
                escapeHtml(findName(data.participants, s.participant_id)) +
                ": " +
                t("부담액", "share") +
                " " +
                formatCurrency(s.share_amount) +
                " / " +
                t("지불액", "paid") +
                " " +
                formatCurrency(s.paid_amount) +
                "</li>",
            )
            .join("");

          const settlementItems =
            data.settlements.length === 0
              ? "<p>" + t("정산할 금액이 없어요.", "Nothing to settle.") + "</p>"
              : "<ul>" +
                data.settlements
                  .map(
                    (s) =>
                      "<li>" +
                      escapeHtml(findName(data.participants, s.from_participant_id)) +
                      " &rarr; " +
                      escapeHtml(findName(data.participants, s.to_participant_id)) +
                      ": " +
                      formatCurrency(s.amount) +
                      " (" +
                      (s.status === "completed" ? t("완료", "done") : t("대기", "pending")) +
                      ")</li>",
                  )
                  .join("") +
                "</ul>";

          render(
            "<h1>" +
              escapeHtml(data.title) +
              "</h1>" +
              "<h2>" +
              t("참여자별 부담액", "Amount per participant") +
              "</h2>" +
              "<ul>" +
              shareItems +
              "</ul>" +
              "<h2>" +
              t("정산 결과", "Settlement") +
              "</h2>" +
              settlementItems,
          );
        } else if (result.status === "expired") {
          render("<p>" + t("링크가 만료됐어요. 정산 생성자에게 다시 요청해주세요.", "This link has expired. Please ask the organizer for a new one.") + "</p>");
        } else if (result.status === "not_found") {
          render("<p>" + t("정산 결과를 찾을 수 없어요. 링크를 다시 확인해주세요.", "Couldn't find this settlement. Please check the link again.") + "</p>");
        } else {
          render("<p>" + t("오류가 발생했어요.", "Something went wrong.") + "</p>");
        }
      })
      .catch(() => {
        render("<p>" + t("오류가 발생했어요.", "Something went wrong.") + "</p>");
      });
  }
</script>
</body>
</html>
