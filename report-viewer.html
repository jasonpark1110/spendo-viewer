<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>경비 보고서</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.css" />
<style>
  body { max-width: 480px; margin: 0 auto; padding: 24px; font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif; color: #191f28; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p.amount { color: #4e5968; margin-bottom: 16px; }
  pre { white-space: pre-wrap; background: #f2f4f6; padding: 16px; border-radius: 8px; font-size: 16px; margin-bottom: 16px; font-family: inherit; }
  img { width: 100%; border-radius: 8px; }
</style>
</head>
<body>
<div id="app"><p id="status">불러오는 중...</p></div>

<script>
  // settlement-viewer.html과 같은 이유로 이 파일도 GitHub Pages(Supabase 밖)에서 서빙된다.
  // (docs/product-spec.md 3.3, 10.2 이슈2 참고)
  const SUPABASE_URL = "https://nvwqtuaatyqewietbwgc.supabase.co";

  const isKo = (navigator.language || "ko-KR").toLowerCase().startsWith("ko");
  const t = (ko, en) => (isKo ? ko : en);

  function formatCurrency(amount) {
    return isKo ? amount.toLocaleString() + "원" : "₩" + amount.toLocaleString();
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function render(html) {
    document.getElementById("app").innerHTML = html;
  }

  const params = new URLSearchParams(location.search);
  const token = params.get("token");

  if (!token) {
    render("<p>" + t("보고서를 찾을 수 없어요. 링크를 다시 확인해주세요.", "Couldn't find this report. Please check the link again.") + "</p>");
  } else {
    fetch(SUPABASE_URL + "/functions/v1/report-viewer/" + encodeURIComponent(token))
      .then((res) => res.json())
      .then((result) => {
        if (result.status === "ok") {
          const data = result.data;
          const amountHtml =
            data.amount !== null ? "<p class=\"amount\">" + formatCurrency(data.amount) + "</p>" : "";
          const imageHtml = data.imageUrl
            ? "<img src=\"" + data.imageUrl + "\" alt=\"" + t("영수증", "receipt") + "\" />"
            : "<p>" + t("영수증 이미지가 없어요.", "No receipt image.") + "</p>";

          render(
            "<h1>" +
              escapeHtml(data.merchantName || t("이름 없음", "Unnamed")) +
              "</h1>" +
              amountHtml +
              "<pre>" +
              escapeHtml(data.generatedText) +
              "</pre>" +
              imageHtml,
          );
        } else if (result.status === "expired") {
          render("<p>" + t("링크가 만료됐어요. 작성자에게 다시 요청해주세요.", "This link has expired. Please ask the sender for a new one.") + "</p>");
        } else if (result.status === "not_found") {
          render("<p>" + t("보고서를 찾을 수 없어요. 링크를 다시 확인해주세요.", "Couldn't find this report. Please check the link again.") + "</p>");
        } else {
          render("<p>" + t("오류가 발생했어요.", "Something went wrong.") + "</p>");
        }
      })
      .catch(() => {
        render("<p>" + t("오류가 발생했어요.", "Something went wrong.") + "</p>");
      });
  }
</script>
</body>
</html>
